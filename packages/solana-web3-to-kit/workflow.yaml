# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: "1"

nodes:
  - id: run-solana-migration
    name: "Apply @solana/web3.js → @solana/kit transforms"
    type: automatic
    steps:
      - name: "Run JSSG transform"
        js-ast-grep:
          js_file: scripts/codemod.ts
          language: "tsx"
