name: EtherMod — Migrate wagmi v1 → v2

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run wagmi migration
        run: npx codemod wagmi-v1-to-v2 --target ./src --no-interactive

      - name: Open Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          title: "chore: migrate wagmi v1 → v2 (EtherMod)"
          body: |
            ## Automated wagmi v1 → v2 migration

            This PR was generated by [EtherMod](https://github.com/softalpha0/EtherMod) via GitHub Actions.

            ### What was changed
            - `useContractRead` → `useReadContract`
            - `useContractWrite` → `useWriteContract`
            - `usePrepareContractWrite` → `useSimulateContract`
            - `useWaitForTransaction` → `useWaitForTransactionReceipt`
            - `useNetwork` → `useChainId`
            - `useSwitchNetwork` → `useSwitchChain`
            - `useContractEvent` → `useWatchContractEvent`
            - `WagmiConfig` → `WagmiProvider`
            - `createClient` → `createConfig`
            - `configureChains` removed (marked with comment)
            - `wagmi/providers/*` imports removed

            ### Review checklist
            - [ ] Review all changed files
            - [ ] Update `createConfig` with your chain configuration
            - [ ] Run your test suite

            > **No code ran on your local machine.** This migration was applied in a sandboxed GitHub Actions runner.

            ---
            🔧 [EtherMod](https://github.com/softalpha0/EtherMod) · [Codemod Registry](https://codemod.com/registry/wagmi-v1-to-v2)
          branch: ethermod/wagmi-v1-to-v2
          commit-message: "chore: migrate wagmi v1 → v2 (EtherMod)"
          delete-branch: true
