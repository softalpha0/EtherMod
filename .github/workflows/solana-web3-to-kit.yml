name: EtherMod — Migrate @solana/web3.js → @solana/kit

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Solana migration
        run: npx codemod solana-web3-to-kit --target ./src --no-interactive

      - name: Open Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          title: "chore: migrate @solana/web3.js → @solana/kit (EtherMod)"
          body: |
            ## Automated @solana/web3.js v1 → @solana/kit migration

            This PR was generated by [EtherMod](https://github.com/softalpha0/EtherMod) via GitHub Actions.

            ### What was changed
            - `@solana/web3.js` → `@solana/kit` (package rename)
            - `new Connection(url)` → `createSolanaRpc(url)`
            - `Keypair.generate()` → `await generateKeyPairSigner()`
            - `Keypair.fromSecretKey(bytes)` → `await createKeyPairSignerFromBytes(bytes)`
            - `new PublicKey(str)` → `address(str)`
            - `.publicKey` property → `.address`
            - RPC method calls → appended `.send()`
            - `sendRawTransaction` → `sendTransaction`

            ### Review checklist
            - [ ] Review all changed files
            - [ ] Ensure all functions using `await` are marked `async`
            - [ ] Run your test suite

            > **No code ran on your local machine.** This migration was applied in a sandboxed GitHub Actions runner.

            ---
            🔧 [EtherMod](https://github.com/softalpha0/EtherMod) · [Codemod Registry](https://codemod.com/registry/solana-web3-to-kit)
          branch: ethermod/solana-web3-to-kit
          commit-message: "chore: migrate @solana/web3.js → @solana/kit (EtherMod)"
          delete-branch: true
