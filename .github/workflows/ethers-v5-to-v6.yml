name: EtherMod — Migrate ethers v5 → v6

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run EtherMod migration
        run: npx codemod ethers-v5-to-v6 --target ./src --no-interactive

      - name: Open Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          title: "chore: migrate ethers.js v5 → v6 (EtherMod)"
          body: |
            ## Automated ethers.js v5 → v6 migration

            This PR was generated by [EtherMod](https://github.com/softalpha0/EtherMod) via GitHub Actions.

            ### What was changed
            - `ethers.BigNumber.from(x)` → `BigInt(x)`
            - `ethers.utils.*` namespace flattened → `ethers.*`
            - `ethers.providers.*` namespace flattened → `ethers.*`
            - `ethers.providers.Web3Provider` → `ethers.BrowserProvider`
            - `ethers.constants.AddressZero` → `ethers.ZeroAddress` (and others)
            - `provider.getGasPrice()` → `(await provider.getFeeData()).gasPrice`
            - `formatBytes32String` → `encodeBytes32String`
            - `parseBytes32String` → `decodeBytes32String`
            - Sub-path imports (`ethers/lib/utils` etc.) → `ethers`

            ### Review checklist
            - [ ] Review all changed files
            - [ ] Check for any chained BigNumber calls that may need manual attention
            - [ ] Run your test suite

            > **No code ran on your local machine.** This migration was applied in a sandboxed GitHub Actions runner.

            ---
            🔧 [EtherMod](https://github.com/softalpha0/EtherMod) · [Codemod Registry](https://codemod.com/registry/ethers-v5-to-v6)
          branch: ethermod/ethers-v5-to-v6
          commit-message: "chore: migrate ethers.js v5 → v6 (EtherMod)"
          delete-branch: true
